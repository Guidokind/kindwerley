  <style>
    :root {
      --white: rgba(246, 248, 250, .94);
      --muted: rgba(246, 248, 250, .46);
      --faint: rgba(246, 248, 250, .16);
      --bg: #020304;
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; overflow: hidden; background: var(--bg); }
    body {
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--white);
      -webkit-font-smoothing: antialiased;
      text-rendering: geometricPrecision;
    }

    .stage,
    #space,
    .atmosphere,
    .vignette,
    .film,
    .hero { position: fixed; inset: 0; }

    .stage {
      overflow: hidden;
      background:
        radial-gradient(ellipse at 50% 50%, rgba(118, 146, 178, .20) 0%, rgba(65, 82, 104, .085) 22%, rgba(3, 6, 8, .96) 64%, #010101 100%),
        linear-gradient(180deg, #020304 0%, #05080a 48%, #010101 100%);
    }

    #space { width: 100%; height: 100%; display: block; opacity: .98; }

    .atmosphere {
      pointer-events: none;
      background:
        radial-gradient(circle at 50% 53%, rgba(230, 240, 255, .135), rgba(140, 170, 210, .045) 21%, transparent 48%),
        radial-gradient(circle at 42% 43%, rgba(190, 210, 255, .035), transparent 35%);
      animation: breathe 11s ease-in-out infinite;
      transform: translate3d(0,0,0);
    }

    .film {
      pointer-events: none;
      opacity: .07;
      mix-blend-mode: soft-light;
      background-image:
        radial-gradient(circle at 10% 20%, rgba(255,255,255,.18) 0 1px, transparent 1.2px),
        radial-gradient(circle at 80% 0%, rgba(255,255,255,.14) 0 .8px, transparent 1px),
        radial-gradient(circle at 30% 75%, rgba(255,255,255,.12) 0 .7px, transparent .95px);
      background-size: 96px 96px, 137px 137px, 173px 173px;
      animation: filmDrift 18s steps(10) infinite;
    }

    .vignette {
      pointer-events: none;
      background:
        radial-gradient(ellipse at center, transparent 0%, transparent 38%, rgba(0,0,0,.38) 68%, rgba(0,0,0,.88) 100%),
        linear-gradient(to bottom, rgba(0,0,0,.44), transparent 30%, transparent 70%, rgba(0,0,0,.55));
    }

    .hero {
      display: grid;
      place-items: center;
      pointer-events: none;
      transform: translate3d(0, 0, 0);
    }

    .mark {
      text-align: center;
      padding: 0 5vw;
      opacity: 0;
      filter: blur(18px);
      transform: translateY(10px) scale(.992);
      animation: reveal 2.2s cubic-bezier(.2,.8,.1,1) .25s forwards;
    }

    h1 {
      margin: 0;
      font-size: clamp(2.15rem, 6.3vw, 6.8rem);
      line-height: 1;
      font-weight: 280;
      letter-spacing: clamp(.42rem, 1.32vw, 1.35rem);
      text-transform: uppercase;
      text-shadow: 0 0 24px rgba(255,255,255,.09), 0 0 90px rgba(190,210,255,.08);
      white-space: nowrap;
    }

    .line {
      width: min(280px, 44vw);
      height: 1px;
      margin: clamp(.9rem, 1.7vw, 1.2rem) auto 0;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,.34), transparent);
      opacity: .45;
    }

    .subtitle {
      margin-top: clamp(1rem, 2.2vw, 1.55rem);
      font-size: clamp(.58rem, .86vw, .82rem);
      letter-spacing: clamp(.22rem, .55vw, .52rem);
      color: var(--muted);
      text-transform: uppercase;
      font-weight: 500;
      animation: breatheText 6s ease-in-out infinite;
    }

    .corner {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,.22);
      font-size: 10px;
      letter-spacing: .26em;
      text-transform: uppercase;
      opacity: .65;
      pointer-events:none;
    }

    @keyframes reveal { to { opacity: 1; filter: blur(0); transform: translateY(0) scale(1); } }
    @keyframes breathe { 0%,100% { opacity: .9; transform: scale(1); } 50% { opacity: 1; transform: scale(1.018); } }
    @keyframes breatheText { 0%,100% { opacity: .62 } 50% { opacity: .92 } }
    @keyframes filmDrift { to { background-position: 96px -96px, -137px 137px, 173px 173px; } }

    @media (max-width: 680px) {
      h1 { font-size: clamp(1.55rem, 8.5vw, 2.65rem); letter-spacing: clamp(.18rem, 1.9vw, .45rem); white-space: normal; }
      .subtitle { letter-spacing: .22rem; font-size: .56rem; }
      .corner { display:none; }
      .film { opacity: .055; }
    }

    @media (prefers-reduced-motion: reduce) {
      .mark, .subtitle, .atmosphere, .film { animation: none; }
      .mark { opacity: 1; filter: none; transform:none; }
    }
  </style>

<body>
  <div class="stage" aria-hidden="true"></div>
  <canvas id="space" aria-hidden="true"></canvas>
  <div class="atmosphere" aria-hidden="true"></div>
  <div class="film" aria-hidden="true"></div>
  <div class="vignette" aria-hidden="true"></div>

  <main class="hero" aria-label="Guido Kindwerley">
    <section class="mark">
      <h1>Guido Kindwerley</h1>
      <div class="line"></div>
      <div class="subtitle">Founder · Pilot · Builder</div>
    </section>
  </main>
  <div class="corner">Kindwerley.com</div>

  <script>
    (() => {
      const canvas = document.getElementById('space');
      const ctx = canvas.getContext('2d', { alpha: true });
      const reduce = matchMedia('(prefers-reduced-motion: reduce)').matches;
      let w = 0, h = 0, dpr = 1, cx = 0, cy = 0;
      let stars = [];
      let mouseX = 0, mouseY = 0, targetX = 0, targetY = 0;
      let last = 0;
      let running = true;

      function resize() {
        dpr = Math.min(devicePixelRatio || 1, 1.75);
        w = innerWidth; h = innerHeight; cx = w / 2; cy = h / 2;
        canvas.width = Math.floor(w * dpr);
        canvas.height = Math.floor(h * dpr);
        canvas.style.width = w + 'px';
        canvas.style.height = h + 'px';
        ctx.setTransform(dpr,0,0,dpr,0,0);
        build();
        render(performance.now(), true);
      }

      function build() {
        const area = w * h;
        const count = Math.round(Math.min(820, Math.max(280, area / 2600)));
        stars = Array.from({ length: count }, () => {
          const z = Math.pow(Math.random(), .82);
          return {
            x: Math.random() * w,
            y: Math.random() * h,
            z,
            r: .32 + z * 1.25 + Math.random() * .55,
            a: .12 + Math.random() * .44,
            vx: (Math.random() - .5) * (.012 + z * .026),
            vy: (Math.random() - .5) * (.010 + z * .022),
            tw: Math.random() * Math.PI * 2,
            hue: Math.random() < .12 ? 210 : Math.random() < .16 ? 38 : 0
          };
        });
      }

      function background(time) {
        ctx.clearRect(0,0,w,h);
        const gx = cx + mouseX * 52 + Math.sin(time * .00012) * 18;
        const gy = cy + mouseY * 42 + Math.cos(time * .00010) * 12;
        const g = ctx.createRadialGradient(gx, gy, 0, gx, gy, Math.max(w,h) * .74);
        g.addColorStop(0, 'rgba(20,30,39,.34)');
        g.addColorStop(.25, 'rgba(8,12,16,.18)');
        g.addColorStop(.65, 'rgba(0,0,0,.05)');
        g.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = g;
        ctx.fillRect(0,0,w,h);
      }

      function render(now, force = false) {
        if (!running && !force) return;
        requestAnimationFrame(render);
        if (!force && now - last < 50) return; // 20 FPS cap: elegant motion, low CPU, Lighthouse friendly.
        last = now;

        const t = now * 0.001;
        mouseX += (targetX - mouseX) * .05;
        mouseY += (targetY - mouseY) * .05;
        background(now);

        ctx.save();
        ctx.globalCompositeOperation = 'screen';
        for (const s of stars) {
          if (!reduce) {
            s.x += s.vx;
            s.y += s.vy;
            if (s.x < -8) s.x = w + 8; else if (s.x > w + 8) s.x = -8;
            if (s.y < -8) s.y = h + 8; else if (s.y > h + 8) s.y = -8;
          }
          const x = s.x + mouseX * (18 * s.z - 5);
          const y = s.y + mouseY * (15 * s.z - 4);
          const pulse = .72 + Math.sin(t * (.55 + s.z * .65) + s.tw) * .28;
          const alpha = Math.max(0, Math.min(1, s.a * pulse));
          const col = s.hue === 210 ? `rgba(185,210,255,${alpha})` : s.hue === 38 ? `rgba(255,238,215,${alpha})` : `rgba(246,248,250,${alpha})`;
          ctx.fillStyle = col;
          if (s.z > .78) { ctx.shadowBlur = 5; ctx.shadowColor = col; } else { ctx.shadowBlur = 0; }
          ctx.beginPath(); ctx.arc(x, y, s.r, 0, Math.PI * 2); ctx.fill();
        }
        ctx.restore();
      }

      addEventListener('pointermove', e => {
        targetX = (e.clientX - cx) / cx;
        targetY = (e.clientY - cy) / cy;
      }, { passive: true });
      addEventListener('pointerleave', () => { targetX = 0; targetY = 0; });
      addEventListener('resize', resize, { passive: true });
      document.addEventListener('visibilitychange', () => {
        running = !document.hidden;
        if (running) requestAnimationFrame(render);
      });

      resize();
      if (!reduce) requestAnimationFrame(render);
    })();
  </script>
