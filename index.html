  <style>
    :root {
      --bg: #020304;
      --white: rgba(246, 248, 250, .96);
      --muted: rgba(246, 248, 250, .62);
      --dim: rgba(246, 248, 250, .30);
    }

    * { box-sizing: border-box; }

    html,
    body {
      min-height: 100%;
      margin: 0;
      background: var(--bg);
    }

    body {
      overflow: hidden;
      color: var(--white);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: geometricPrecision;
      background:
        radial-gradient(ellipse at 50% 52%, rgba(34, 47, 58, .28) 0%, rgba(12, 19, 25, .20) 30%, rgba(2, 3, 4, .72) 66%, #010101 100%),
        linear-gradient(180deg, #020304 0%, #04070a 50%, #010101 100%);
    }

    .atmosphere,
    .atmosphere::before,
    .atmosphere::after,
    .vignette {
      position: fixed;
      inset: 0;
      pointer-events: none;
    }

    .atmosphere {
      z-index: 0;
      overflow: hidden;
      opacity: .94;
    }

    .atmosphere::before,
    .atmosphere::after {
      content: "";
      will-change: transform;
      transform: translate3d(0,0,0);
    }

    .atmosphere::before {
      opacity: .55;
      background-image:
        radial-gradient(circle at 11% 18%, rgba(255,255,255,.74) 0 1px, transparent 1.7px),
        radial-gradient(circle at 21% 72%, rgba(190,215,255,.52) 0 1px, transparent 1.8px),
        radial-gradient(circle at 36% 28%, rgba(255,255,255,.48) 0 .9px, transparent 1.8px),
        radial-gradient(circle at 58% 66%, rgba(255,255,255,.40) 0 .8px, transparent 1.6px),
        radial-gradient(circle at 78% 22%, rgba(210,230,255,.46) 0 1px, transparent 2px),
        radial-gradient(circle at 91% 84%, rgba(255,255,255,.50) 0 .9px, transparent 1.7px);
      background-size: 360px 360px, 420px 420px, 520px 520px, 610px 610px, 680px 680px, 760px 760px;
      animation: driftA 78s linear infinite;
    }

    .atmosphere::after {
      opacity: .42;
      background-image:
        radial-gradient(circle at 16% 44%, rgba(255,255,255,.52) 0 .8px, transparent 1.7px),
        radial-gradient(circle at 47% 18%, rgba(190,215,255,.40) 0 .8px, transparent 1.7px),
        radial-gradient(circle at 72% 56%, rgba(255,255,255,.44) 0 .8px, transparent 1.8px),
        radial-gradient(circle at 86% 34%, rgba(255,238,220,.35) 0 .8px, transparent 1.6px);
      background-size: 290px 290px, 470px 470px, 590px 590px, 720px 720px;
      filter: blur(.15px);
      animation: driftB 118s linear infinite;
    }

    @keyframes driftA { to { transform: translate3d(-42px, -36px, 0); } }
    @keyframes driftB { to { transform: translate3d(46px, 30px, 0); } }

    .vignette {
      z-index: 1;
      background:
        radial-gradient(ellipse at center, transparent 0%, transparent 47%, rgba(0,0,0,.45) 75%, rgba(0,0,0,.92) 100%),
        linear-gradient(to bottom, rgba(0,0,0,.38), transparent 28%, transparent 72%, rgba(0,0,0,.56));
    }

    .hero {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      z-index: 2;
      pointer-events: none;
    }

    .mark {
      text-align: center;
      padding: 0 5vw;
    }

    h1 {
      margin: 0;
      color: var(--white);
      font-size: clamp(2.15rem, 6.3vw, 6.8rem);
      font-weight: 280;
      letter-spacing: clamp(.42rem, 1.32vw, 1.35rem);
      line-height: 1;
      text-transform: uppercase;
      white-space: nowrap;
      text-shadow:
        0 0 2px rgba(255,255,255,.34),
        0 0 7px rgba(255,255,255,.16),
        0 0 22px rgba(220,235,255,.095),
        0 0 70px rgba(175,205,255,.060);
    }

    .line {
      width: min(238px, 38vw);
      height: 1px;
      margin: clamp(.9rem, 1.7vw, 1.2rem) auto 0;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,.32), transparent);
      opacity: .42;
    }

    .subtitle {
      margin-top: clamp(1rem, 2.2vw, 1.55rem);
      color: var(--muted);
      font-size: clamp(.6rem, .86vw, .82rem);
      font-weight: 500;
      letter-spacing: clamp(.22rem, .55vw, .52rem);
      text-transform: uppercase;
    }

    .corner {
      position: fixed;
      bottom: 28px;
      left: 50%;
      z-index: 2;
      transform: translateX(-50%);
      color: var(--dim);
      font-size: 10px;
      letter-spacing: .26em;
      text-transform: uppercase;
      pointer-events: none;
    }

    @media (max-width: 680px) {
      h1 {
        font-size: clamp(1.55rem, 8.5vw, 2.65rem);
        letter-spacing: clamp(.18rem, 1.9vw, .45rem);
        white-space: normal;
      }
      .subtitle {
        font-size: .58rem;
        letter-spacing: .22rem;
      }
      .corner { display: none; }
    }

    @media (prefers-reduced-motion: reduce) {
      .atmosphere::before,
      .atmosphere::after { animation: none; }
    }
  </style>
