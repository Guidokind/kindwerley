  <style>
    :root {
      --white: rgba(246, 248, 250, .94);
      --muted: rgba(246, 248, 250, .46);
      --faint: rgba(246, 248, 250, .18);
      --bg: #020304;
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; background: var(--bg); }

    body {
      overflow: hidden;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--white);
      -webkit-font-smoothing: antialiased;
      text-rendering: geometricPrecision;
      background:

        linear-gradient(180deg, #020304 0%, #04070a 48%, #010101 100%);
    }

    #space {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      opacity: 0;
      transition: opacity 1.4s ease;
      pointer-events: none;
    }
    body.ready #space { opacity: 1; }

    .vignette {
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(ellipse at center, transparent 0%, transparent 44%, rgba(0,0,0,.46) 74%, rgba(0,0,0,.9) 100%),
        linear-gradient(to bottom, rgba(0,0,0,.34), transparent 26%, transparent 74%, rgba(0,0,0,.55));
    }

    .hero {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      pointer-events: none;
      z-index: 2;
    }

    .mark {
      text-align: center;
      padding: 0 5vw;
      transform: translateY(0);
    }

    h1 {
      margin: 0;
      font-size: clamp(2.15rem, 6.3vw, 6.8rem);
      line-height: 1;
      font-weight: 280;
      letter-spacing: clamp(.42rem, 1.32vw, 1.35rem);
      text-transform: uppercase;
      white-space: nowrap;
      color: rgba(246,248,250,.94);
      text-shadow:
        0 0 3px rgba(255,255,255,.22),
        0 0 12px rgba(255,255,255,.105),
        0 0 34px rgba(215,230,255,.075),
        0 0 92px rgba(175,205,255,.055);
    }

    .subtitle {
      margin-top: clamp(1rem, 2.2vw, 1.55rem);
      font-size: clamp(.58rem, .86vw, .82rem);
      letter-spacing: clamp(.22rem, .55vw, .52rem);
      color: var(--muted);
      text-transform: uppercase;

    }

    .line {
      width: min(240px, 38vw);
      height: 1px;
      margin: clamp(.9rem, 1.7vw, 1.2rem) auto 0;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,.28), transparent);
      opacity: .38;
    }

    .corner {
      position: fixed;
      color: rgba(255,255,255,.20);
      font-size: 10px;
      letter-spacing: .26em;
      text-transform: uppercase;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      opacity: .6;
      pointer-events:none;
      z-index: 2;
    }

    @media (max-width: 680px) {

        font-size: clamp(1.55rem, 8.5vw, 2.65rem);

      .corner { display:none; }
    }

    @media (prefers-reduced-motion: reduce) {

<body>
  <canvas id="space" aria-hidden="true"></canvas>
  <div class="vignette" aria-hidden="true"></div>

  <main class="hero" aria-label="Guido Kindwerley">
    <section class="mark">
      <h1>Guido Kindwerley</h1>
      <div class="line" aria-hidden="true"></div>
      <div class="subtitle">Founder · Pilot · Builder</div>
    </section>
  </main>

  <div class="corner" aria-hidden="true">Kindwerley.com</div>

  <script>
    (() => {
      const reduce = matchMedia('(prefers-reduced-motion: reduce)').matches;
      if (reduce) return;

      const canvas = document.getElementById('space');
      const ctx = canvas.getContext('2d', { alpha: true });
      let w = 0, h = 0, dpr = 1;
      let particles = [];
      let running = false;
      let last = 0;
      let time = 0;

      function resize() {
        dpr = Math.min(window.devicePixelRatio || 1, 1.8);
        w = window.innerWidth;
        h = window.innerHeight;
        canvas.width = Math.floor(w * dpr);
        canvas.height = Math.floor(h * dpr);
        canvas.style.width = w + 'px';
        canvas.style.height = h + 'px';
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        build();
      }

      function build() {
        const isMobile = w < 720;
        const count = Math.min(isMobile ? 220 : 520, Math.max(170, Math.round((w * h) / (isMobile ? 5200 : 3900))));
        particles = Array.from({ length: count }, () => {
          const z = Math.random();
          return {
            x: Math.random() * w,
            y: Math.random() * h,
            z,
            r: .35 + z * 1.15 + Math.random() * .45,
            a: .05 + z * .34 + Math.random() * .16,
            vx: (Math.random() - .5) * (.012 + z * .035),
            vy: (Math.random() - .5) * (.009 + z * .028),
            p: Math.random() * Math.PI * 2,
            c: Math.random() < .12 ? 'blue' : 'white'
          };
        });
      }

      function clearBackground() {
        ctx.clearRect(0, 0, w, h);

        const glow = ctx.createRadialGradient(w / 2, h * .52, 0, w / 2, h * .52, Math.max(w, h) * .52);
        glow.addColorStop(0, 'rgba(145,170,205,.075)');
        glow.addColorStop(.34, 'rgba(75,95,120,.030)');
        glow.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = glow;
        ctx.fillRect(0, 0, w, h);
      }

      function draw(now) {
        if (!running) return;
        const dt = Math.min(34, now - last || 16);
        last = now;
        time += dt * 0.001;

        clearBackground();

        ctx.save();
        ctx.globalCompositeOperation = 'lighter';
        for (const p of particles) {
          p.x += p.vx * dt;
          p.y += p.vy * dt;
          if (p.x < -20) p.x = w + 20;
          if (p.x > w + 20) p.x = -20;
          if (p.y < -20) p.y = h + 20;
          if (p.y > h + 20) p.y = -20;

          const pulse = .72 + Math.sin(time * (.5 + p.z) + p.p) * .28;
          const alpha = p.a * pulse;
          ctx.fillStyle = p.c === 'blue'
            ? `rgba(180,210,255,${alpha})`
            : `rgba(246,248,250,${alpha})`;
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.restore();

        requestAnimationFrame(draw);
      }

      function start() {
        if (running) return;
        running = true;
        last = performance.now();
        document.body.classList.add('ready');
        requestAnimationFrame(draw);
      }

      function stop() { running = false; }

      window.addEventListener('resize', resize, { passive: true });
      document.addEventListener('visibilitychange', () => document.hidden ? stop() : start());

      resize();
      window.addEventListener('load', () => setTimeout(start, 420), { once: true });
    })();
  </script>
