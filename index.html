  <style>
    :root {
      --white: rgba(246, 248, 250, .94);
      --muted: rgba(246, 248, 250, .44);
      --faint: rgba(246, 248, 250, .16);
      --bg: #020304;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; overflow: hidden; background: var(--bg); }
    body {
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--white);
      -webkit-font-smoothing: antialiased;
      text-rendering: geometricPrecision;
    }
    canvas { position: fixed; inset: 0; width: 100%; height: 100%; display: block; }
    .vignette {
      position: fixed; inset: 0; pointer-events: none;
      background:
        radial-gradient(ellipse at center, transparent 0%, transparent 38%, rgba(0,0,0,.35) 68%, rgba(0,0,0,.86) 100%),
        linear-gradient(to bottom, rgba(0,0,0,.4), transparent 30%, transparent 70%, rgba(0,0,0,.52));
    }
    .hero {
      position: fixed; inset: 0; display: grid; place-items: center; pointer-events: none;
      transform: translate3d(0, 0, 0);
    }
    .mark {
      text-align: center; padding: 0 5vw; opacity: 0; filter: blur(18px);
      transform: translateY(10px) scale(.992);
      animation: reveal 2.4s cubic-bezier(.2,.8,.1,1) .35s forwards;
    }
    @keyframes reveal { to { opacity: 1; filter: blur(0); transform: translateY(0) scale(1); } }
    h1 {
      margin: 0;
      font-size: clamp(2.15rem, 6.3vw, 6.8rem);
      line-height: 1;
      font-weight: 280;
      letter-spacing: clamp(.42rem, 1.32vw, 1.35rem);
      text-transform: uppercase;
      text-shadow: 0 0 24px rgba(255,255,255,.09), 0 0 90px rgba(190,210,255,.08);
      white-space: nowrap;
    }
    .subtitle {
      margin-top: clamp(1rem, 2.2vw, 1.55rem);
      font-size: clamp(.58rem, .86vw, .82rem);
      letter-spacing: clamp(.22rem, .55vw, .52rem);
      color: var(--muted);
      text-transform: uppercase;
      font-weight: 500;
      animation: breatheText 6s ease-in-out infinite;
    }
    @keyframes breatheText { 0%,100% { opacity: .62 } 50% { opacity: .92 } }
    .line {
      width: min(280px, 44vw); height: 1px; margin: clamp(.9rem, 1.7vw, 1.2rem) auto 0;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,.34), transparent);
      opacity: .45;
    }
    .corner {
      position: fixed; color: rgba(255,255,255,.22); font-size: 10px; letter-spacing: .26em;
      text-transform: uppercase; bottom: 28px; left: 50%; transform: translateX(-50%);
      opacity: .65; pointer-events:none;
    }
    @media (max-width: 680px) {
      h1 { font-size: clamp(1.55rem, 8.5vw, 2.65rem); letter-spacing: clamp(.18rem, 1.9vw, .45rem); white-space: normal; }
      .subtitle { letter-spacing: .22rem; font-size: .56rem; }
      .corner { display:none; }
    }
    @media (prefers-reduced-motion: reduce) {
      .mark, .subtitle { animation: none; opacity: 1; filter: none; transform:none; }

</head>
<body>
  <canvas id="space" aria-hidden="true"></canvas>
  <div class="vignette"></div>
  <main class="hero" aria-label="Guido Kindwerley">
    <section class="mark">
      <h1>Guido Kindwerley</h1>
      <div class="line"></div>
      <div class="subtitle">Founder · Pilot · Builder</div>
    </section>
  </main>
  <div class="corner">Kindwerley.com</div>

  <script>
    (() => {
      const canvas = document.getElementById('space');
      const ctx = canvas.getContext('2d', { alpha: false });
      const reduce = matchMedia('(prefers-reduced-motion: reduce)').matches;
      let w = 0, h = 0, dpr = 1, cx = 0, cy = 0, t = 0;
      let particles = [], noiseCanvas, noiseCtx, noiseSize = 160, frame = 0;
      const mouse = { x: 0, y: 0, tx: 0, ty: 0 };

      function resize() {
        dpr = Math.min(devicePixelRatio || 1, 2);
        w = innerWidth; h = innerHeight; cx = w / 2; cy = h / 2;
        canvas.width = Math.floor(w * dpr); canvas.height = Math.floor(h * dpr);
        canvas.style.width = w + 'px'; canvas.style.height = h + 'px';
        ctx.setTransform(dpr,0,0,dpr,0,0);
        buildParticles();
        buildNoiseCanvas();
      }

      function buildParticles() {
        const area = w * h;
        const count = Math.round(Math.min(1650, Math.max(650, area / 1450)));
        particles = Array.from({ length: count }, () => {
          const z = Math.pow(Math.random(), .72);
          return {
            x: Math.random() * w,
            y: Math.random() * h,
            z,
            r: (Math.random() * .75 + .18) * (.55 + z * 1.25),
            a: (Math.random() * .34 + .055) * (.42 + z * .95),
            vx: (Math.random() - .5) * (.035 + z * .12),
            vy: (Math.random() - .5) * (.028 + z * .095),
            phase: Math.random() * Math.PI * 2,
            hue: Math.random() < .14 ? 'blue' : Math.random() < .18 ? 'warm' : 'white'
          };
        });
      }

      function buildNoiseCanvas() {
        noiseCanvas = document.createElement('canvas');
        noiseCtx = noiseCanvas.getContext('2d', { alpha: true });
        noiseCanvas.width = noiseCanvas.height = noiseSize;
        updateNoise();
      }

      function updateNoise() {
        if (!noiseCtx) return;
        const img = noiseCtx.createImageData(noiseSize, noiseSize);
        const data = img.data;
        for (let i = 0; i < data.length; i += 4) {
          const v = 116 + Math.random() * 112;
          const a = Math.random() < .82 ? Math.random() * 9 : Math.random() * 2;
          data[i] = v; data[i + 1] = v; data[i + 2] = v; data[i + 3] = a;
        }
        noiseCtx.putImageData(img, 0, 0);
      }

      function particleColor(p, alphaMul=1) {
        const a = Math.max(0, Math.min(1, p.a * alphaMul));
        if (p.hue === 'blue') return `rgba(185,210,255,${a})`;
        if (p.hue === 'warm') return `rgba(255,238,215,${a})`;
        return `rgba(246,248,250,${a})`;
      }

      function background() {
        const gx = cx + mouse.x * 95 + Math.sin(t*.16)*16;
        const gy = cy + mouse.y * 75 + Math.cos(t*.13)*12;
        const g = ctx.createRadialGradient(gx, gy, 0, gx, gy, Math.max(w,h) * .78);
        g.addColorStop(0, '#111920');
        g.addColorStop(.18, '#090d11');
        g.addColorStop(.52, '#030506');
        g.addColorStop(1, '#010101');
        ctx.fillStyle = g;
        ctx.fillRect(0,0,w,h);

        const halo = ctx.createRadialGradient(cx + mouse.x * 145, cy + 12 + mouse.y * 95, 0, cx + mouse.x * 145, cy + 12 + mouse.y * 95, Math.min(w,h) * .52);
        halo.addColorStop(0, 'rgba(210,226,255,.118)');
        halo.addColorStop(.28, 'rgba(138,165,205,.055)');
        halo.addColorStop(.64, 'rgba(70,90,115,.018)');
        halo.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = halo;
        ctx.fillRect(0,0,w,h);
      }

      function drawConnections() {
        ctx.save();
        ctx.globalCompositeOperation = 'screen';
        ctx.lineWidth = .48;
        const mid = particles.filter(p => p.z > .42 && p.z < .82 && Math.abs((p.y + mouse.y * 14) - cy) < h * .28);
        const limit = Math.min(mid.length, 180);
        for (let i = 0; i < limit; i++) {
          const a = mid[i];
          const ax = a.x + mouse.x * (40 * a.z - 12), ay = a.y + mouse.y * (32 * a.z - 8);
          for (let j = i + 1; j < Math.min(limit, i + 12); j++) {
            const b = mid[j];
            const bx = b.x + mouse.x * (40 * b.z - 12), by = b.y + mouse.y * (32 * b.z - 8);
            const dx = ax - bx, dy = ay - by, dd = dx*dx + dy*dy;
            if (dd < 104*104) {
              const alpha = (1 - Math.sqrt(dd)/104) * .09;
              ctx.strokeStyle = `rgba(220,232,255,${alpha})`;
              ctx.beginPath(); ctx.moveTo(ax, ay); ctx.lineTo(bx, by); ctx.stroke();
            }
          }
        }
        ctx.restore();
      }

      function drawNoise() {
        if (!noiseCanvas || reduce) return;
        if (frame % 4 === 0) updateNoise();
        const pattern = ctx.createPattern(noiseCanvas, 'repeat');
        ctx.save();
        ctx.globalCompositeOperation = 'soft-light';
        ctx.globalAlpha = .36;
        const ox = -((frame * 7) % noiseSize);
        const oy = -((frame * 3) % noiseSize);
        ctx.translate(ox, oy);
        ctx.fillStyle = pattern;
        ctx.fillRect(-noiseSize, -noiseSize, w + noiseSize * 2, h + noiseSize * 2);
        ctx.restore();
      }

      function draw(now) {
        if (document.hidden) { requestAnimationFrame(draw); return; }
        t = now * 0.001;
        frame++;
        mouse.x += (mouse.tx - mouse.x) * .07;
        mouse.y += (mouse.ty - mouse.y) * .07;
        background();

        ctx.save();
        ctx.globalCompositeOperation = 'lighter';
        const mx = cx + mouse.x * cx, my = cy + mouse.y * cy;
        for (const p of particles) {
          if (!reduce) {
            p.x += p.vx + Math.sin(t * .33 + p.phase) * .018 * p.z;
            p.y += p.vy + Math.cos(t * .29 + p.phase) * .014 * p.z;
            if (p.x < -20) p.x = w + 20; if (p.x > w + 20) p.x = -20;
            if (p.y < -20) p.y = h + 20; if (p.y > h + 20) p.y = -20;
          }
          const x = p.x + mouse.x * (46 * p.z - 12) + Math.sin(t*.08 + p.phase) * (1.4*p.z);
          const y = p.y + mouse.y * (36 * p.z - 9) + Math.cos(t*.07 + p.phase) * (1.1*p.z);
          const dist = Math.hypot(x - mx, y - my);
          const twinkle = .72 + Math.sin(t * (1.05 + p.z * .35) + p.phase) * .28;
          ctx.shadowBlur = p.z > .83 ? 4.8 : p.z < .18 ? 1.4 : 0;
          ctx.shadowColor = particleColor(p, .9);
          ctx.fillStyle = particleColor(p, twinkle * (dist < 180 ? 1.1 : 1));
          ctx.beginPath(); ctx.arc(x, y, p.r, 0, Math.PI * 2); ctx.fill();
        }
        ctx.restore();

        drawConnections();

        const sweep = (Math.sin(t * .13) * .5 + .5) * (w + 500) - 250;
        const lg = ctx.createLinearGradient(sweep - 160, 0, sweep + 160, h);
        lg.addColorStop(0, 'rgba(255,255,255,0)');
        lg.addColorStop(.5, 'rgba(230,240,255,.018)');
        lg.addColorStop(1, 'rgba(255,255,255,0)');
        ctx.fillStyle = lg; ctx.fillRect(0,0,w,h);

        drawNoise();
        requestAnimationFrame(draw);
      }

      addEventListener('pointermove', e => {
        mouse.tx = (e.clientX - cx) / cx;
        mouse.ty = (e.clientY - cy) / cy;
      }, { passive: true });
      addEventListener('pointerleave', () => { mouse.tx = 0; mouse.ty = 0; });
      addEventListener('resize', resize);
      resize();
      requestAnimationFrame(draw);
    })();
  </script>
</body>
</html>
