    @keyframes driftGrain {
      0% { transform: translate3d(0,0,0) }
      25% { transform: translate3d(-18px, 11px, 0) }
      50% { transform: translate3d(13px, -17px, 0) }
      75% { transform: translate3d(-7px, -9px, 0) }
      100% { transform: translate3d(0,0,0) }
    }
100% { transform: translate3d(-8%,4%,0)} }
    .vignette {
      position: fixed; inset: 0; pointer-events: none;
      background:
        radial-gradient(ellipse at center, transparent 0%, transparent 38%, rgba(0,0,0,.35) 68%, rgba(0,0,0,.86) 100%),
        linear-gradient(to bottom, rgba(0,0,0,.4), transparent 30%, transparent 70%, rgba(0,0,0,.52));
    }
    .hero {
      position: fixed; inset: 0; display: grid; place-items: center; pointer-events: none;
      transform: translate3d(0, 0, 0);
    }
    .mark { text-align: center; padding: 0 5vw; opacity: 0; filter: blur(18px); transform: translateY(10px) scale(.992); animation: reveal 2.4s cubic-bezier(.2,.8,.1,1) .35s forwards; }
    @keyframes reveal { to { opacity: 1; filter: blur(0); transform: translateY(0) scale(1); } }
    h1 {
      margin: 0;
      font-size: clamp(2.15rem, 6.3vw, 6.8rem);
      line-height: 1;
      font-weight: 280;
      letter-spacing: clamp(.42rem, 1.32vw, 1.35rem);
      text-transform: uppercase;
      text-shadow: 0 0 24px rgba(255,255,255,.09), 0 0 90px rgba(190,210,255,.08);
      white-space: nowrap;
    }
    .subtitle {
      margin-top: clamp(1rem, 2.2vw, 1.55rem);
      font-size: clamp(.58rem, .86vw, .82rem);
      letter-spacing: clamp(.22rem, .55vw, .52rem);
      color: var(--muted);
      text-transform: uppercase;
      font-weight: 500;
      animation: breatheText 6s ease-in-out infinite;
    }
    @keyframes breatheText { 0%,100% { opacity: .62 } 50% { opacity: .92 } }
    .line {
      width: min(280px, 44vw); height: 1px; margin: clamp(.9rem, 1.7vw, 1.2rem) auto 0;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,.34), transparent);
      opacity: .45;
    }
    .corner {
      position: fixed; color: rgba(255,255,255,.22); font-size: 10px; letter-spacing: .26em; text-transform: uppercase;
      bottom: 28px; left: 50%; transform: translateX(-50%); opacity: .65; pointer-events:none;
    }
    @media (max-width: 680px) {
      h1 { font-size: clamp(1.55rem, 8.5vw, 2.65rem); letter-spacing: clamp(.18rem, 1.9vw, .45rem); white-space: normal; }
      .subtitle { letter-spacing: .22rem; font-size: .56rem; }
      .corner { display:none; }
    }
    @media (prefers-reduced-motion: reduce) { .grain, .mark, .subtitle { animation: none; opacity: 1; filter: none; transform:none; } }

</head>
<body>
  <canvas id="space" aria-hidden="true"></canvas>
  <div class="grain"></div>
  <div class="vignette"></div>
  <main class="hero" aria-label="Guido Kindwerley">
    <section class="mark">
      <h1>Guido Kindwerley</h1>
      <div class="line"></div>
      <div class="subtitle">Founder · Pilot · Builder</div>
    </section>
  </main>
  <div class="corner">Kindwerley.com</div>
  <script>
    (() => {
      const canvas = document.getElementById('space');
      const ctx = canvas.getContext('2d', { alpha: false });
      let w = 0, h = 0, dpr = 1, cx = 0, cy = 0;
      let particles = [];
      let t = 0;
      const mouse = { x: 0, y: 0, tx: 0, ty: 0, active: false };
      const reduce = matchMedia('(prefers-reduced-motion: reduce)').matches;

      function resize() {
        dpr = Math.min(devicePixelRatio || 1, 2.35);
        w = innerWidth; h = innerHeight; cx = w / 2; cy = h / 2;
        canvas.width = Math.floor(w * dpr); canvas.height = Math.floor(h * dpr);
        canvas.style.width = w + 'px'; canvas.style.height = h + 'px';
        ctx.setTransform(dpr,0,0,dpr,0,0);
        build();
      }

      function build() {
        const area = w * h;
        const base = Math.round(Math.min(2600, Math.max(850, area / 1150)));
        particles = [];
        for (let i = 0; i < base; i++) {
          const layerPick = Math.random();
          const z = layerPick < .62 ? Math.random() * .45 + .05 : layerPick < .91 ? Math.random() * .3 + .5 : Math.random() * .2 + .8;
          particles.push({
            x: Math.random() * w,
            y: Math.random() * h,
            z,
            r: (Math.random() * 0.9 + 0.22) * (0.55 + z * 1.15),
            a: (Math.random() * 0.42 + 0.08) * (0.45 + z * .9),
            vx: (Math.random() - .5) * (0.06 + z * .14),
            vy: (Math.random() - .5) * (0.04 + z * .11),
            phase: Math.random() * Math.PI * 2,
            tw: Math.random() * .018 + .004,
            hue: Math.random() < .16 ? 'blue' : Math.random() < .18 ? 'warm' : 'white'
          });
        }
      }

      addEventListener('pointermove', e => { mouse.tx = (e.clientX - cx) / cx; mouse.ty = (e.clientY - cy) / cy; mouse.active = true; }, { passive: true });
      addEventListener('pointerleave', () => { mouse.tx = 0; mouse.ty = 0; mouse.active = false; });
      addEventListener('resize', resize);

      function bg() {
        const gx = cx + mouse.x * 70, gy = cy + mouse.y * 55;
        const g = ctx.createRadialGradient(gx, gy, 0, gx, gy, Math.max(w,h) * .78);
        g.addColorStop(0, '#101820');
        g.addColorStop(.18, '#090d11');
        g.addColorStop(.52, '#030506');
        g.addColorStop(1, '#010101');
        ctx.fillStyle = g;
        ctx.fillRect(0,0,w,h);

        const halo = ctx.createRadialGradient(cx + mouse.x * 110, cy + 12 + mouse.y * 75, 0, cx + mouse.x * 110, cy + 12 + mouse.y * 75, Math.min(w,h) * .52);
        halo.addColorStop(0, 'rgba(210,226,255,.115)');
        halo.addColorStop(.26, 'rgba(138,165,205,.055)');
        halo.addColorStop(.62, 'rgba(70,90,115,.018)');
        halo.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = halo;
        ctx.fillRect(0,0,w,h);
      }

      function color(p, alphaMul=1) {
        const a = Math.max(0, Math.min(1, p.a * alphaMul));
        if (p.hue === 'blue') return `rgba(185,210,255,${a})`;
        if (p.hue === 'warm') return `rgba(255,238,215,${a})`;
        return `rgba(246,248,250,${a})`;
      }

      function draw(now) {
        t = now * 0.001;
        mouse.x += (mouse.tx - mouse.x) * .045;
        mouse.y += (mouse.ty - mouse.y) * .045;
        bg();

        ctx.save();
        ctx.globalCompositeOperation = 'lighter';
        const mx = cx + mouse.x * cx, my = cy + mouse.y * cy;
        for (const p of particles) {
          if (!reduce) {
            p.x += p.vx + Math.sin(t * .23 + p.phase) * .012 * p.z;
            p.y += p.vy + Math.cos(t * .19 + p.phase) * .01 * p.z;
            if (p.x < -20) p.x = w + 20; if (p.x > w + 20) p.x = -20;
            if (p.y < -20) p.y = h + 20; if (p.y > h + 20) p.y = -20;
          }
          const parx = mouse.x * (30 * p.z - 10), pary = mouse.y * (24 * p.z - 8);
          let x = p.x + parx, y = p.y + pary;
          const dx = x - mx, dy = y - my; const dist = Math.sqrt(dx*dx + dy*dy);
          if (dist < 180 && !reduce) {
            const force = (1 - dist / 180) * 10 * p.z;
            x += dx / (dist || 1) * force; y += dy / (dist || 1) * force;
          }
          const twinkle = .72 + Math.sin(t * (1.1 + p.tw * 20) + p.phase) * .28;
          const blur = p.z > .82 ? 5.5 : p.z < .18 ? 1.8 : 0;
          if (blur) ctx.shadowBlur = blur;
          ctx.shadowColor = color(p, .95);
          ctx.fillStyle = color(p, twinkle);
          ctx.beginPath(); ctx.arc(x, y, p.r, 0, Math.PI * 2); ctx.fill();
        }
        ctx.restore();

        // Sparse living connections around the title area only, subtle and expensive-looking.
        ctx.save();
        ctx.globalCompositeOperation = 'screen';
        ctx.lineWidth = .55;
        const mid = particles.filter(p => p.z > .38 && p.z < .76 && Math.abs((p.y + mouse.y * 16) - cy) < h * .28);
        for (let i = 0; i < Math.min(mid.length, 260); i++) {
          const a = mid[i];
          const ax = a.x + mouse.x * (30 * a.z - 10), ay = a.y + mouse.y * (24 * a.z - 8);
          for (let j = i + 1; j < Math.min(mid.length, i + 18); j++) {
            const b = mid[j];
            const bx = b.x + mouse.x * (30 * b.z - 10), by = b.y + mouse.y * (24 * b.z - 8);
            const dx = ax - bx, dy = ay - by, dd = dx*dx + dy*dy;
            if (dd < 92*92) {
              const alpha = (1 - Math.sqrt(dd)/92) * .075;
              ctx.strokeStyle = `rgba(220,232,255,${alpha})`;
              ctx.beginPath(); ctx.moveTo(ax, ay); ctx.lineTo(bx, by); ctx.stroke();
            }
          }
        }
        ctx.restore();

        // Cinematic scan glint, almost invisible.
        const sweep = (Math.sin(t * .16) * .5 + .5) * (w + 500) - 250;
        const lg = ctx.createLinearGradient(sweep - 160, 0, sweep + 160, h);
        lg.addColorStop(0, 'rgba(255,255,255,0)');
        lg.addColorStop(.48, 'rgba(230,240,255,.018)');
        lg.addColorStop(1, 'rgba(255,255,255,0)');
        ctx.fillStyle = lg; ctx.fillRect(0,0,w,h);

        requestAnimationFrame(draw);
      }
      resize();
      requestAnimationFrame(draw);
    })();
  </script>
</body>
</html>
